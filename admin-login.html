<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Parkit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ── NAVIGATION ── -->
<nav>
  <div class="logo">
    <div class="logo-icon">P</div>
    Parkit
  </div>
  <div class="nav-tabs">
    <a href="index.html"><button class="nav-tab">Find Parking</button></a>
    <a href="about.html"><button class="nav-tab">About Us</button></a>
    <a href="contact.html"><button class="nav-tab">Contact Us</button></a>
  </div>
  <div class="nav-actions">
    <a href="auth.html"><button class="btn btn-outline btn-sm">User Login</button></a>
  </div>
</nav>

<!-- ── ADMIN AUTH CARD ── -->
<div class="auth-card" style="padding-top:2rem">
  <div class="auth-inner">

    <!-- Icon + Title -->
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem">⚙️</div>
      <h2 style="margin-top:.5rem">Parking Manager Portal</h2>
      <p style="font-size:13px;color:var(--muted)">Admin access only</p>
    </div>

    <!-- Login / New Admin Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="adm-tab-login"  onclick="switchAdminMode('login')">Login</button>
      <button class="auth-tab"        id="adm-tab-signup" onclick="switchAdminMode('signup')">New Admin</button>
    </div>

    <!-- Signup only: Full Name -->
    <div class="form-group" id="adm-field-name" style="display:none">
      <label class="form-label">Full Name *</label>
      <input class="form-input" id="adm-name" type="text" placeholder="Manager name">
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input class="form-input" id="adm-email" type="email" placeholder="admin@parkit.in">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password *</label>
      <input class="form-input" id="adm-pass" type="password" placeholder="Min. 6 characters">
    </div>

    <!-- Signup only: Location -->
    <div class="form-group" id="adm-field-location" style="display:none">
      <label class="form-label">Your Parking Location *</label>
      <select class="form-input" id="adm-location">
        <option value="">— Select your parking location —</option>
        <option value="p101">Hazratganj Central Parking — Lucknow</option>
        <option value="p102">Gomti Nagar Metro Parking — Lucknow</option>
        <option value="p103">Charbagh Station Parking — Lucknow</option>
        <option value="p104">Phoenix Palassio Mall Parking — Lucknow</option>
        <option value="p201">Kashi Vishwanath Corridor Parking — Varanasi</option>
        <option value="p202">BHU Gate Parking — Varanasi</option>
        <option value="p501">Taj Mahal East Gate Parking — Agra</option>
        <option value="p601">DLF Mall of India Parking — Noida</option>
        <option value="p401">Civil Lines Central Parking — Prayagraj</option>
      </select>
    </div>

    <!-- Submit Button -->
    <button class="btn btn-primary" id="adm-btn"
      style="width:100%;padding:12px;margin-top:.5rem"
      onclick="handleAdminAuth()">
      Admin Login
    </button>

    <!-- Regular user redirect -->
    <div style="text-align:center;margin-top:1rem;font-size:12px;color:var(--muted)">
      Regular user? <a href="auth.html">Login here →</a>
    </div>

  </div>
</div>

<script>
/* ── Firebase Init ── */
firebase.initializeApp({
  apiKey:            "AIzaSyD125N7kbyfdy5JC-flH85dGrClT7n0R1w",
  authDomain:        "parkit-9e035.firebaseapp.com",
  projectId:         "parkit-9e035",
  storageBucket:     "parkit-9e035.firebasestorage.app",
  messagingSenderId: "672621386685",
  appId:             "1:672621386685:web:a7354d99eda5adb597d0d4"
});
const auth = firebase.auth();
const db   = firebase.firestore();

/* ── State ── */
let adminMode = 'login';

/* ── Validation helpers ── */
const V = {
  pass: v => v.length >= 6
};

function $(id) { return document.getElementById(id); }
function val(id) { return $(id)?.value.trim() || ''; }
function passVal(id) { return $(id)?.value || ''; }

function toast(msg, type = 'info') {
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function fbErr(code) {
  return ({
    'auth/email-already-in-use': 'This email is already registered.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password. Please try again.',
    'auth/invalid-credential':   'Invalid email or password.',
    'auth/too-many-requests':    'Too many attempts. Please wait a moment.',
    'permission-denied':         'Firestore permission denied. Check security rules.',
  }[code] || 'Something went wrong (' + code + '). Please try again.');
}

/* ── Switch Mode ── */
function switchAdminMode(mode) {
  adminMode = mode;
  $('adm-tab-login').classList.toggle('active',  mode === 'login');
  $('adm-tab-signup').classList.toggle('active', mode === 'signup');

  const show = mode === 'signup';
  $('adm-field-name').style.display     = show ? 'block' : 'none';
  $('adm-field-location').style.display = show ? 'block' : 'none';
  $('adm-btn').textContent = show ? 'Create Admin Account' : 'Admin Login';
}

/* ── Route ── */
function handleAdminAuth() {
  if (adminMode === 'login') doAdminLogin();
  else doAdminSignup();
}

/* ── Admin Login ── */
async function doAdminLogin() {
  const email = val('adm-email');
  const pass  = passVal('adm-pass');
  if (!email || !pass) { toast('Please enter email and password', 'error'); return; }

  const btn = $('adm-btn');
  btn.disabled    = true;
  btn.textContent = 'Logging in…';

  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    // Verify admin record exists
    const aDoc = await db.collection('admins').doc(cred.user.uid).get();
    if (!aDoc.exists) {
      await auth.signOut();
      toast('This is not an admin account. Use the regular Login page.', 'error');
      btn.disabled    = false;
      btn.textContent = 'Admin Login';
      return;
    }
    toast('Welcome, Admin! 👋', 'success');
    setTimeout(() => window.location.href = 'admin.html', 800);
  } catch (e) {
    toast(fbErr(e.code), 'error');
    btn.disabled    = false;
    btn.textContent = 'Admin Login';
  }
}

/* ── Admin Signup ── */
async function doAdminSignup() {
  const name  = val('adm-name');
  const email = val('adm-email');
  const pass  = passVal('adm-pass');
  const locId = val('adm-location');

  if (!name || !email || !pass || !locId) {
    toast('All fields are required', 'error'); return;
  }
  if (!V.pass(pass)) {
    toast('Password must be at least 6 characters', 'error'); return;
  }

  const btn = $('adm-btn');
  btn.disabled    = true;
  btn.textContent = 'Creating…';

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('admins').doc(cred.user.uid).set({
      name, email, parkingLocationId: locId,
      role: 'admin', createdAt: new Date().toISOString()
    });
    toast('Admin account created! 🎉', 'success');
    setTimeout(() => window.location.href = 'admin.html', 800);
  } catch (e) {
    toast(fbErr(e.code), 'error');
    btn.disabled    = false;
    btn.textContent = 'Create Admin Account';
  }
}
</script>

</body>
</html>
